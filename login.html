<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • IceCreamInnovative</title>
<link rel="stylesheet" href="css/style.css">
</head><body>
<header class="navbar">
  <div class="brand">🔐 Login</div>
  <nav><a href="index.html">Home</a></nav>
</header>
<div class="container">
  <form id="loginForm" class="card" style="padding:20px; max-width:420px; margin:auto">
    <h2>Welcome back!</h2>
    <input type="email" id="email" placeholder="Email" required style="padding:12px; border-radius:12px; border:1px solid rgba(0,0,0,.1); width:100%; margin:8px 0;">
    <input type="password" id="password" placeholder="Password" required style="padding:12px; border-radius:12px; border:1px solid rgba(0,0,0,.1); width:100%; margin:8px 0;">
    <button class="btn" type="submit">Login</button>
  </form>
</div>
<script src="js/script.js"></script>
</body></html>
